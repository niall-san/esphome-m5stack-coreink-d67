substitutions:
  name: m5stack-core-ink-kitchen
  friendly_name: m5stack-core-ink-kitchen

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  variant: esp32
  flash_size: 4MB
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "<existing key>"

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: m5stack-coreink-d67 Fallback Hotspot
    password: "<existing fallback password>"

captive_portal:

external_components:
  - source: ../components
    components: [m5stack_coreink_d67]

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

font:
  - file: "gfonts://Helvetica"
    id: helvetica_18
    size: 18
  - file: "gfonts://Helvetica"
    id: helvetica_24
    size: 24
  - file: "gfonts://Helvetica"
    id: helvetica_28
    size: 28
  - file: "gfonts://Helvetica"
    id: helvetica_34
    size: 34

globals:
  - id: current_page
    type: int
    restore_value: no
    initial_value: "0"

time:
  - platform: homeassistant
    id: ha_time

button:
  - platform: template
    name: "CoreInk Force Display Refresh"
    on_press:
      then:
        - component.update: my_display

  - platform: template
    name: "CoreInk Next Page"
    on_press:
      then:
        - lambda: |-
            id(current_page) = (id(current_page) + 1) % 3;
        - component.update: my_display

  - platform: template
    name: "CoreInk Previous Page"
    on_press:
      then:
        - lambda: |-
            id(current_page) = (id(current_page) + 2) % 3;
        - component.update: my_display

binary_sensor:
  - platform: gpio
    id: coreink_dial_up
    name: "CoreInk Dial Up"
    pin:
      number: GPIO37
      inverted: true
    on_press:
      then:
        - lambda: |-
            id(current_page) = (id(current_page) + 1) % 3;
        - component.update: my_display

  - platform: gpio
    id: coreink_dial_down
    name: "CoreInk Dial Down"
    pin:
      number: GPIO39
      inverted: true
    on_press:
      then:
        - lambda: |-
            id(current_page) = (id(current_page) + 2) % 3;
        - component.update: my_display

  - platform: gpio
    id: coreink_user_button
    name: "CoreInk User Button"
    pin:
      number: GPIO5
      inverted: true
    on_press:
      then:
        - component.update: my_display

sensor:
  - platform: homeassistant
    id: outside_temperature
    entity_id: sensor.outside_met_office_home_temperature
    internal: true

  - platform: homeassistant
    id: rain_probability
    entity_id: sensor.outside_met_office_home_probability_of_precipitation
    internal: true

  - platform: homeassistant
    id: living_room_temperature
    entity_id: sensor.lounge_temperature_sensor_temperature
    internal: true

  - platform: homeassistant
    id: living_room_humidity
    entity_id: sensor.lounge_temperature_sensor_humidity
    internal: true

  - platform: homeassistant
    id: bedroom_temperature
    entity_id: sensor.bedroom_temperature_sensor_temperature
    internal: true

  - platform: homeassistant
    id: bedroom_humidity
    entity_id: sensor.bedroom_temperature_sensor_humidity
    internal: true

  - platform: homeassistant
    id: office_temperature
    entity_id: sensor.office_temperature_sensor_temperature
    internal: true

  - platform: homeassistant
    id: office_humidity
    entity_id: sensor.office_temperature_sensor_humidity
    internal: true

text_sensor:
  - platform: homeassistant
    id: next_bin_type
    entity_id: sensor.next_bin_collection
    attribute: bin_type
    internal: true

  - platform: homeassistant
    id: next_bin_date
    entity_id: sensor.next_bin_collection
    attribute: date
    internal: true

  - platform: homeassistant
    id: outside_weather
    entity_id: sensor.outside_met_office_home_weather
    internal: true

  - platform: homeassistant
    id: next_rain
    entity_id: input_text.next_rain
    internal: true

display:
  - platform: m5stack_coreink_d67
    id: my_display
    cs_pin: GPIO9
    dc_pin: GPIO15
    busy_pin: GPIO4
    power_hold_pin: GPIO12
    update_interval: 60s
    full_update_every: 10
    lambda: |-
      it.fill(Color::WHITE);

      if (id(current_page) == 0) {
        std::string bin = id(next_bin_type).state;
        std::string date = id(next_bin_date).state;

        if (bin.empty() || bin == "unknown" || bin == "unavailable") {
          bin = "Bin";
        }

        if (date.empty() || date == "unknown" || date == "unavailable") {
          date = "Waiting";
        }

        if (date.length() > 5) {
          date = date.substr(0, date.length() - 5);
        }

        std::string bin_label = bin + " bin";

        it.print(14, 12, id(helvetica_18), Color::BLACK, "NEXT COLLECTION");
        it.line(14, 34, 186, 34, Color::BLACK);
        it.rectangle(22, 72, 48, 58, Color::BLACK);
        it.filled_rectangle(18, 62, 56, 8, Color::BLACK);
        it.rectangle(32, 52, 28, 10, Color::BLACK);
        it.line(34, 82, 34, 120, Color::BLACK);
        it.line(46, 82, 46, 120, Color::BLACK);
        it.line(58, 82, 58, 120, Color::BLACK);
        it.filled_circle(32, 139, 5, Color::BLACK);
        it.filled_circle(61, 139, 5, Color::BLACK);

        if (bin.length() > 8) {
          it.printf(82, 74, id(helvetica_24), Color::BLACK, "%s", bin.c_str());
          it.print(82, 104, id(helvetica_24), Color::BLACK, "bin");
        } else {
          it.printf(76, 84, id(helvetica_28), Color::BLACK, "%s", bin_label.c_str());
        }

        it.printf(14, 164, id(helvetica_24), Color::BLACK, "%s", date.c_str());
      } else if (id(current_page) == 1) {
        std::string weather = id(outside_weather).state;
        std::string rain = id(next_rain).state;

        if (weather.empty() || weather == "unknown" || weather == "unavailable") {
          weather = "Weather";
        }

        if (rain.empty() || rain == "unknown" || rain == "unavailable") {
          rain = "Checking rain";
        }

        it.print(14, 12, id(helvetica_18), Color::BLACK, "WEATHER");
        auto now = id(ha_time).now();
        if (now.is_valid()) {
          char date_buf[16];
          now.strftime(date_buf, sizeof(date_buf), "%d %b");
          it.printf(132, 12, id(helvetica_18), Color::BLACK, "%s", date_buf);
        }
        it.line(14, 34, 186, 34, Color::BLACK);
        it.printf(18, 56, id(helvetica_34), Color::BLACK, "%.0fC", id(outside_temperature).state);
        it.printf(18, 98, id(helvetica_18), Color::BLACK, "%s", weather.c_str());
        it.printf(18, 124, id(helvetica_18), Color::BLACK, "Rain %.0f%%", id(rain_probability).state);
        it.printf(14, 166, id(helvetica_18), Color::BLACK, "%s", rain.c_str());
      } else {
        it.print(14, 12, id(helvetica_18), Color::BLACK, "COMFORT");
        it.line(14, 34, 186, 34, Color::BLACK);
        it.print(18, 48, id(helvetica_18), Color::BLACK, "Living");
        it.printf(112, 46, id(helvetica_24), Color::BLACK, "%.1fC", id(living_room_temperature).state);
        it.printf(112, 72, id(helvetica_18), Color::BLACK, "%.0f%%", id(living_room_humidity).state);
        it.line(18, 96, 182, 96, Color::BLACK);
        it.print(18, 108, id(helvetica_18), Color::BLACK, "Bedroom");
        it.printf(112, 106, id(helvetica_24), Color::BLACK, "%.1fC", id(bedroom_temperature).state);
        it.printf(112, 132, id(helvetica_18), Color::BLACK, "%.0f%%", id(bedroom_humidity).state);
        it.line(18, 154, 182, 154, Color::BLACK);
        it.print(18, 164, id(helvetica_18), Color::BLACK, "Office");
        it.printf(112, 160, id(helvetica_24), Color::BLACK, "%.1fC", id(office_temperature).state);
        it.printf(112, 182, id(helvetica_18), Color::BLACK, "%.0f%%", id(office_humidity).state);
      }

      it.rectangle(0, 0, 200, 200, Color::BLACK);

